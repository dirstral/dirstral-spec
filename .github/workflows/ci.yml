name: Spec CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Required files
        run: |
          test -f docs/SPEC.md
          test -f docs/ECOSYSTEM.md
          test -f docs/x402-payment-adapter-spec.md
          test -f spec/versioning.md
          test -f spec/tools/schemas.md
          test -f spec/errors/taxonomy.md
  links-basic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Markdown link sanity
        run: |
          # grep, not rg: ripgrep is not on the runner image, so `! rg ...`
          # returned 127 -> inverted to success and this gate never ran.
          if grep -rn --include='*.md' -F '](../SPEC.md)' docs spec; then
            echo "::error::Use local relative links from repo root layout: SPEC.md lives at docs/SPEC.md, so '../SPEC.md' from docs/ does not resolve."
            exit 1
          fi
