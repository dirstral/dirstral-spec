name: Spec Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-note:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish tag summary
        run: |
          echo "Spec release tag: ${GITHUB_REF_NAME}"
